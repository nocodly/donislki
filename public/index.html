<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Donisl · KI</title>
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --red: #9E1B1B;
    --red-deep: #7A1414;
    --gold: #C9A227;
    --text: #241F1A;
    --text2: #7A6A6A;
    --border: #F0DCDC;
    --bubble-user: #9E1B1B;
    --bubble-bot: #FBEFEF;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
  }
  .app {
    position: relative;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--surface);
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  /* ---------- Landing / presentation screen ---------- */
  #landing {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px 28px;
    background:
      radial-gradient(circle at 50% 15%, #FFFDF7 0%, var(--bg) 65%);
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  }
  #landing.hidden {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
  }
  #landing .rosette {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    position: absolute;
    top: -60px;
    right: -60px;
    background: radial-gradient(circle, #F4EEDC 0%, transparent 70%);
    z-index: -1;
  }
  #landing .doodles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: -1;
  }
  #landing .doodles span {
    position: absolute;
    filter: grayscale(0.15);
    opacity: 0.14;
  }
  #landing .d1 { top: 6%;  left: -12px; font-size: 62px; transform: rotate(-20deg); }
  #landing .d2 { top: 12%; right: 6%;   font-size: 34px; transform: rotate(12deg); }
  #landing .d3 { top: 62%; right: -16px;font-size: 76px; transform: rotate(16deg); }
  #landing .d4 { bottom: 6%; left: 10%; font-size: 46px; transform: rotate(-10deg); }
  #landing .d5 { bottom: 22%; right: 22%; font-size: 30px; transform: rotate(8deg); }
  #landing .logo {
    height: 64px;
    margin-bottom: 10px;
  }
  #landing .rule {
    width: 46px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 14px;
    opacity: 0.8;
  }
  #landing .badge {
    display: inline-block;
    font-family: Georgia, serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2.5px;
    color: #fff;
    background: var(--red);
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  #landing .subtitle {
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text2);
    margin: 0 0 36px;
  }
  #landing .start-btn {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 16px 26px;
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: 0.2px;
    box-shadow: 0 6px 18px rgba(158,27,27,0.3);
    min-width: 260px;
    max-width: 90vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
  }
  #landing .start-btn .cursor {
    display: inline-block;
    margin-left: 2px;
    animation: blink 0.9s step-start infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  #landing .hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text2);
    opacity: 0.7;
  }
  .credit {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 11px;
    color: var(--text2);
    opacity: 0.6;
    text-align: center;
  }
  .credit a {
    color: var(--text2);
    text-decoration: underline;
  }
  #landing .credit {
    margin-top: 28px;
  }
  #chatScreen .credit {
    padding: 6px 0 10px;
    border-top: 1px solid var(--border);
  }

  /* ---------- Chat screen ---------- */
  #chatScreen {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  header img.logo {
    height: 30px;
  }
  header .badge-sm {
    font-family: Georgia, serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: #fff;
    background: var(--red);
    padding: 2px 7px;
    border-radius: 999px;
  }
  header .header-icon {
    font-size: 17px;
  }
  #chatScreen {
    position: relative;
  }
  .chat-doodles {
    position: absolute;
    left: 0;
    right: 0;
    top: 58px;
    bottom: 90px;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .chat-doodles span {
    position: absolute;
    opacity: 0.08;
    filter: grayscale(0.15);
  }
  .chat-doodles .c1 { top: 4%;  left: -18px; font-size: 56px; transform: rotate(-16deg); }
  .chat-doodles .c2 { top: 34%; right: -20px; font-size: 64px; transform: rotate(14deg); }
  .chat-doodles .c3 { top: 68%; left: -10px; font-size: 46px; transform: rotate(-8deg); }
  #messages {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }
  .msg-row.user {
    justify-content: flex-end;
  }
  .avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.45;
    font-size: 15px;
    white-space: pre-wrap;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.typing {
    align-self: flex-start;
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    color: var(--text2);
    font-style: italic;
  }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .suggestions.hidden { display: none; }
  .chip {
    background: var(--bubble-bot);
    color: var(--red-deep);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13.5px;
    font-weight: 600;
    white-space: nowrap;
  }
  .chip:active {
    background: var(--red);
    color: #fff;
  }
  form {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 16px;
    max-height: 100px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  button.send {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0 18px;
    font-size: 16px;
    font-weight: 600;
  }
  button:disabled { opacity: 0.5; }
</style>
</head>
<body>
  <div class="app">
    <div id="landing">
      <div class="rosette"></div>
      <div class="doodles" aria-hidden="true">
        <span class="d1">🥨</span>
        <span class="d2">🍻</span>
        <span class="d3">🍺</span>
        <span class="d4">🧀</span>
        <span class="d5">🥨</span>
      </div>
      <img class="logo" src="./assets/donisl-logo.png" alt="Donisl" />
      <div class="rule"></div>
      <p class="subtitle" id="subtitle">KI консультант</p>
      <button class="start-btn" id="startBtn"><span id="typedText"></span><span class="cursor">|</span></button>
      <div class="hint">München · Sommerkarte</div>
      <div class="credit"><span class="credit-text">Developed by</span> <a href="https://nocodly.com" target="_blank" rel="noopener">nocodly</a></div>
    </div>

    <div id="chatScreen">
      <header>
        <img class="logo" src="./assets/donisl-logo.png" alt="Donisl" />
        <span class="badge-sm">KI</span>
        <span class="header-icon">🥨</span>
      </header>
      <div class="chat-doodles" aria-hidden="true">
        <span class="c1">🍺</span>
        <span class="c2">🥨</span>
        <span class="c3">🧀</span>
      </div>
      <div id="messages"></div>
      <div id="suggestions" class="suggestions">
        <button class="chip" data-icon="🥨"></button>
        <button class="chip" data-icon="🍺"></button>
        <button class="chip" data-icon="🥗"></button>
        <button class="chip" data-icon="🍰"></button>
      </div>
      <form id="form">
        <textarea id="input" rows="1" placeholder="Ask DonislKi"></textarea>
        <button class="send" type="submit">➤</button>
      </form>
      <div class="credit"><span class="credit-text">Developed by</span> <a href="https://nocodly.com" target="_blank" rel="noopener">nocodly</a></div>
    </div>
  </div>
  <script>window.BASE_PATH = "__BASE_PATH__";</script>
  <script src="./chat.js"></script>
</body>
</html>
